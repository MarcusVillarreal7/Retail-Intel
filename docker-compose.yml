version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: retail_intel_db
    environment:
      POSTGRES_DB: retail_intel
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/csvs:/data/csvs
      - ./data/seed.sql:/docker-entrypoint-initdb.d/seed.sql

volumes:
  pgdata:
